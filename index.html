<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>kmoell</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@800&display=swap" rel="stylesheet">

    <style>
        :root {
            /* Новая палитра по вашему изображению */
            --dark-bg: #2a312a; /* Темный зеленый */
            --accent-yellow: #fcc240; /* Теплый желтый */
            --accent-sage: #b5c5b5; /* Шалфейный зеленый */
            
            --card-bg: rgba(15, 17, 15, 0.7);
            --card-border: rgba(255, 255, 255, 0.1);
            
            --text-primary: #f4f4f5; 
            --text-secondary: #a1a1aa; 

            --font-main: 'Inter', sans-serif;
            --font-heading: 'Manrope', sans-serif;
            
            --transition-curve: cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* =================== АНИМАЦИЯ "РАДИОВОЛНЫ" =================== */
        body {
            background-color: var(--dark-bg);
            color: var(--text-primary);
            font-family: var(--font-main);
            margin: 0;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        .radio-wave-container {
            position: absolute;
            top: 50%; left: 50%;
            width: 100%; height: 100%;
            z-index: 1;
            transform: translate(-50%, -50%);
        }

        .wave {
            position: absolute;
            top: 50%; left: 50%;
            border: 2px solid;
            border-radius: 50%;
            transform: translate(-50%, -50%) scale(0);
            opacity: 0;
        }

        .wave.yellow { border-color: var(--accent-yellow); }
        .wave.sage { border-color: var(--accent-sage); }

        .wave-1 { animation: radiate 4s infinite linear; width: 500px; height: 500px; }
        .wave-2 { animation: radiate 4s infinite linear 1s; width: 700px; height: 700px; }
        .wave-3 { animation: radiate 4s infinite linear 2s; width: 900px; height: 900px; }
        .wave-4 { animation: radiate 4s infinite linear 3s; width: 1100px; height: 1100px; }

        @keyframes radiate {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 0.5; }
            100% { transform: translate(-50%, -50%) scale(2); opacity: 0; }
        }

        /* =================== ОСНОВНОЙ КОНТЕЙНЕР =================== */
        .main-container {
            position: relative; z-index: 2;
            display: flex; flex-direction: column; align-items: center;
            padding: 40px 20px; min-height: 100vh; box-sizing: border-box;
        }

        /* =================== НАВИГАЦИЯ =================== */
        .main-nav {
            display: flex; gap: 10px;
            background: var(--card-bg); backdrop-filter: blur(12px);
            border: 1px solid var(--card-border);
            border-radius: 99px; padding: 6px; margin-bottom: 30px;
        }
        .nav-button {
            background-color: transparent; color: var(--text-secondary);
            border: none; padding: 8px 18px; border-radius: 99px;
            cursor: pointer; font-weight: 600; font-size: 0.9rem;
            transition: all 0.3s var(--transition-curve);
        }
        .nav-button.active {
            background-color: var(--accent-yellow);
            color: var(--dark-bg);
            box-shadow: 0 0 15px rgba(252, 194, 64, 0.4);
        }

        /* =================== КОНТЕЙНЕР ДЛЯ ВКЛАДОК =================== */
        .view-container {
            width: 100%; max-width: 420px;
            display: grid;
        }
        .view {
            grid-area: 1 / 1;
            transition: opacity 0.4s var(--transition-curve), transform 0.4s var(--transition-curve);
        }
        .view.hidden {
            opacity: 0; pointer-events: none;
            transform: translateY(10px) scale(0.98);
        }

        /* =================== КАРТОЧКА ПРОФИЛЯ =================== */
        .profile-card {
            background: var(--card-bg); backdrop-filter: blur(24px);
            border: 1px solid var(--card-border); border-radius: 24px;
            padding: 32px; text-align: center; box-shadow: 0 16px 60px rgba(0, 0, 0, 0.4);
        }
        .avatar {
            width: 128px; height: 128px; border-radius: 50%;
            border: 4px solid var(--accent-yellow);
            margin-bottom: 20px;
            box-shadow: 0 0 25px rgba(252, 194, 64, 0.3);
        }
        .nickname { font-family: var(--font-heading); font-size: 2.5rem; line-height: 1.1; font-weight: 800; margin: 0; letter-spacing: -0.05em; }
        .realname { color: var(--text-primary); opacity: 0.9; font-size: 1.1rem; font-weight: 500; margin: 8px 0 24px 0; }
        .social-links { display: flex; justify-content: center; gap: 16px; margin-top: 24px; }
        .social-links a {
            color: var(--text-secondary); background-color: rgba(30, 30, 32, 0.7);
            border-radius: 50%; display: grid; place-items: center;
            width: 48px; height: 48px;
            transition: all 0.2s var(--transition-curve);
        }
        .social-links a:hover {
            color: var(--dark-bg);
            background-color: var(--accent-yellow);
            transform: translateY(-4px);
        }
        .social-links svg { width: 26px; height: 26px; }

        /* =================== ВКЛАДКА "МОЕ ЛИЦО" =================== */
        .face-spoiler {
            background: var(--card-bg); backdrop-filter: blur(24px);
            border: 1px solid var(--card-border); border-radius: 20px;
            padding: 20px; cursor: pointer; overflow: hidden;
        }
        .face-spoiler-image {
            width: 100%;
            height: auto;
            border-radius: 12px;
            display: block;
            filter: blur(20px); /* Начальный блюр */
            transition: filter 0.5s var(--transition-curve);
        }
        .face-spoiler.revealed .face-spoiler-image {
            filter: blur(0px); /* Убираем блюр */
        }
    </style>
</head>
<body>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const navButtons = document.querySelectorAll('.nav-button');
            const views = document.querySelectorAll('.view');
            const faceSpoiler = document.getElementById('face-spoiler-container');

            // --- Логика переключения вкладок ---
            navButtons.forEach(button => {
                button.addEventListener('click', () => {
                    const targetViewId = button.id.replace('nav-', '') + '-view';
                    
                    navButtons.forEach(btn => btn.classList.remove('active'));
                    button.classList.add('active');

                    views.forEach(view => {
                        view.classList.toggle('hidden', view.id !== targetViewId);
                    });
                });
            });

            // --- Логика спойлера для фото ---
            if (faceSpoiler) {
                faceSpoiler.addEventListener('click', () => {
                    faceSpoiler.classList.toggle('revealed');
                });
            }
        });
    </script>
